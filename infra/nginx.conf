worker_processes auto;
events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain application/json application/javascript text/css image/png;

    # Rate limiting for subscription endpoint
    limit_req_zone $binary_remote_addr zone=subscribe:10m rate=5r/m;

    upstream api_upstream {
        server api:8000;
    }

    upstream web_upstream {
        server web:3000;
    }

    server {
        listen 80;
        server_name _;

        # ── Static overlays and NPZ artifacts (served directly by nginx) ────
        location /static/runs/ {
            alias /srv/static/runs/;
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        # ── FastAPI ──────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://api_upstream;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location /api/subscriptions {
            limit_req  zone=subscribe burst=3 nodelay;
            proxy_pass http://api_upstream;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Prometheus (restrict to localhost only) ───────────────────────
        location /metrics {
            allow 127.0.0.1;
            deny  all;
            proxy_pass http://api_upstream/metrics;
        }

        # ── Next.js frontend (catch-all) ──────────────────────────────────
        location / {
            proxy_pass         http://web_upstream;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
